<!DOCTYPE html>
<html>
<head>
    <title>BMI Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 450px;
            margin: 40px auto;
            padding: 20px;
            background-color: white;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>BMI Calculator</h2>

<label>Height Unit</label>
<select id="heightUnit" onchange="changeHeightFields()">
    <option value="ft">Feet & Inches</option>
    <option value="cm">Centimeters (cm)</option>
    <option value="m">Meters (m)</option>
</select>


<div id="ftSection">
    <label>Feet</label>
    <input type="number" id="feet" min="0" placeholder="Feet">

    <label>Inches</label>
    <input type="number" id="inches" min="0" max="11" placeholder="Inches">
</div>


<div id="cmSection">
    <label>Height (cm)</label>
    <input type="number" id="cm" min="0" placeholder="Centimeters">
</div>


<div id="mSection">
    <label>Height (m)</label>
    <input type="number" id="meter" min="0" step="0.01" placeholder="Meters">
</div>

<label>Weight (kg)</label>
<input type="number" id="weight" min="1" step="0.1" placeholder="Weight in kg">

<button onclick="calculateBMI()">Calculate BMI</button>

<div id="result"></div>

<script>
function changeHeightFields() {
    const unit = document.getElementById("heightUnit").value;

    document.getElementById("ftSection").style.display =
        unit === "ft" ? "block" : "none";

    document.getElementById("cmSection").style.display =
        unit === "cm" ? "block" : "none";

    document.getElementById("mSection").style.display =
        unit === "m" ? "block" : "none";
}

function calculateBMI() {
    const unit = document.getElementById("heightUnit").value;
    const weight = parseFloat(document.getElementById("weight").value);

    let heightMeters = 0;

    if (unit === "ft") {
        const feet = parseFloat(document.getElementById("feet").value) || 0;
        const inches = parseFloat(document.getElementById("inches").value) || 0;

        const totalInches = (feet * 12) + inches;
        heightMeters = totalInches * 0.0254;
    }
    else if (unit === "cm") {
        const cm = parseFloat(document.getElementById("cm").value);
        heightMeters = cm / 100;
    }
    else if (unit === "m") {
        heightMeters = parseFloat(document.getElementById("meter").value);
    }

    if (!heightMeters || !weight || heightMeters <= 0 || weight <= 0) {
        document.getElementById("result").innerHTML =
            "Please enter valid height and weight.";
        return;
    }

    const bmi = weight / (heightMeters * heightMeters);

    let category = "";

    if (bmi < 18.5) {
        category = "Underweight";
    } else if (bmi < 25) {
        category = "Normal Weight";
    } else if (bmi < 30) {
        category = "Overweight";
    } else {
        category = "Obese";
    }

    document.getElementById("result").innerHTML = `
        BMI: <strong>${bmi.toFixed(2)}</strong><br>
        Category: <strong>${category}</strong>
    `;
}
</script>

</body>
</html>
